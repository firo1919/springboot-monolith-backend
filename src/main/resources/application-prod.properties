spring.config.activate.on-profile=prod
management.server.port=${MANAGEMENT_SERVER_PORT:6060}
logging.level.root=WARN

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# swagger
springdoc.swagger-ui.enabled=false

# database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=monolithHikariPool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-test-query=${HIKARI_CONNECTION_TEST_QUERY:SELECT 1}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION_THRESHOLD:60000}


# s3
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.s3.region=${AWS_REGION}
spring.cloud.aws.s3.endpoint=${AWS_S3_ENDPOINT}
spring.cloud.aws.s3.path-style-access-enabled=${SPRING_CLOUD_AWS_S3_PATHSTYLEACCESSENABLED:true}
s3.bucket-name=${S3_BUCKET_NAME}
s3.get-link-expiry-minutes=${S3_GET_LINK_EXPIRY_MINUTES:10}
s3.upload-link-expiry-minutes=${S3_UPLOAD_LINK_EXPIRY_MINUTES:2}

# mail
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}

# admin contact
admin.email=${ADMIN_EMAIL}
admin.phone=${ADMIN_PHONE}

# Security
auth.secret=${AUTH_SECRET}
cors.origins=${CORS_ORIGINS}
app.bootstrap.token=${APP_BOOTSTRAP_TOKEN}

