spring.config.activate.on-profile=dev
management.server.port=6060
logging.level.root=DEBUG

# Hibernate (schema is owned by Flyway; Hibernate only validates it matches the entities)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# database
spring.datasource.url=jdbc:postgresql://localhost:5432/monolith
spring.datasource.username=postgres
spring.datasource.password=password

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=monolithHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# swagger
springdoc.swagger-ui.enabled=true

# s3
spring.cloud.aws.credentials.access-key=test-access-key
spring.cloud.aws.credentials.secret-key=test-secret-key
spring.cloud.aws.s3.region=us-east-1
spring.cloud.aws.s3.endpoint=http://localhost:9000
spring.cloud.aws.s3.path-style-access-enabled=true
s3.bucket-name=test-bucket
s3.get-link-expiry-minutes=10
s3.upload-link-expiry-minutes=2

# mail
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.auth=false  

# admin contact
admin.email=admin@example.com
admin.phone=+251900000000

