spring.application.name=monolith-test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

auth.secret=test-auth-secret-test-auth-secret-123456
cors.origins=http://localhost:8080
app.bootstrap.token=test-bootstrap-token-12345678901234

s3.bucket-name=test-bucket
s3.get-link-expiry-minutes=10
s3.upload-link-expiry-minutes=2
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test-access-key
spring.cloud.aws.credentials.secret-key=test-secret-key
spring.mail.host=localhost
spring.mail.port=2525

admin.email=admin@example.com
admin.phone=+251900000000
